<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Zone Archive</title>
google-site-verification=mcTAb9DbfBHn5WD8yYrsObPmAlGqyBlIjgbfSK_sEJQ
<style>
:root{
 --bg:#05070a;--card:#0f1216;--gold:#d4af37;
 --text:#e6e6e6;--muted:#9aa0a6;--border:#1e232b
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Tahoma}
body{background:var(--bg);color:var(--text);padding:30px}
header{text-align:center;margin-bottom:25px}
h1{color:var(--gold);font-size:2.6rem}
nav{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
nav button{padding:10px 15px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer}
nav button.active{border-color:var(--gold)}
.controls{display:flex;gap:10px;justify-content:center;margin:20px 0;flex-wrap:wrap}
input,select,button{
 background:var(--card);color:var(--text);
 border:1px solid var(--border);
 padding:10px 14px;border-radius:10px
}
/* زر اللغة بتصميم بلايستيشن */
button.lang {
 width: 50px;
 height: 50px;
 border-radius: 50%;
 background: linear-gradient(145deg,#0055ff,#1a7bff);
 color: #fff;
 font-weight: bold;
 font-size: 1rem;
 border: none;
 cursor: pointer;
 box-shadow: 0 5px #003cb3;
 transition: all 0.2s ease;
}
button.lang:active {
 transform: translateY(4px);
 box-shadow: 0 1px #003cb3;
}
button.lang:hover {
 background: linear-gradient(145deg,#0066ff,#3399ff);
}

.archive{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
 gap:25px;max-width:1400px;margin:auto
}
.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:16px;padding:22px;
 transition:.3s
}
.card:hover{transform:translateY(-5px);border-color:var(--gold)}
.card h2{color:var(--gold)}
.tag{
 display:inline-block;margin:10px 0;
 font-size:.75rem;padding:4px 10px;
 border-radius:20px;
 background:rgba(212,175,55,.15);color:var(--gold)
}
.section{font-size:.8rem;color:var(--muted);margin-top:12px;text-transform:uppercase}
footer{text-align:center;margin-top:40px;color:var(--muted)}
</style>
</head>

<body>

<header>
<h1 id="title">Game Zone Archive</h1>
<p id="subtitle">Video Game Encyclopedia</p>
</header>

<nav>
<button class="tab active" data-tab="characters">Characters</button>
<button class="tab" data-tab="games">Games</button>
<button class="lang"></button>
</nav>

<div class="controls" id="controls">
<input id="search" placeholder="Search...">
<select id="filter">
<option value="all">All</option>
</select>
</div>

<section class="archive" id="archive"></section>

<footer>© 2026 — Game Zone Archive</footer>

<script>
// ==== اللغة ====
let lang="en";

// ==== Tabs ====
const tabs=document.querySelectorAll(".tab");
let currentTab="characters";
tabs.forEach(t=>{
 t.onclick=()=>{
  tabs.forEach(b=>b.classList.remove("active"));
  t.classList.add("active");
  currentTab=t.dataset.tab;
  setupFilter();
  render();
 }
});

// ==== البيانات ====
const characters=[
  // Skyrim
  {w:"Skyrim",en:{n:"Dragonborn",p:"Words shape reality.",m:"Hero on a frozen peak."},ar:{n:"دراجونبورن",p:"الكلمات تشكّل الواقع.",m:"بطل فوق قمة جليدية."}},
  {w:"Skyrim",en:{n:"Alduin",p:"Destruction is destiny.",m:"World-eating dragon."},ar:{n:"ألدوين",p:"الدمار هو القدر.",m:"تنين يلتهم العالم."}},
  {w:"Skyrim",en:{n:"Paarthurnax",p:"Restraint over domination.",m:"Ancient wise dragon."},ar:{n:"بارثورنكس",p:"الحكمة فوق السيطرة.",m:"تنين حكيم."}},
  {w:"Skyrim",en:{n:"Ulfric",p:"Freedom at any cost.",m:"Rebel warlord."},ar:{n:"أولفريك",p:"الحرية بأي ثمن.",m:"قائد متمرد."}},
  {w:"Skyrim",en:{n:"Miraak",p:"Power must be taken.",m:"Masked tyrant."},ar:{n:"ميرااك",p:"القوة تُنتزع.",m:"طاغية مقنّع."}},
  {w:"Skyrim",en:{n:"Serana",p:"Survival through choice.",m:"Vampire between worlds."},ar:{n:"سيرانا",p:"البقاء بالتكيف.",m:"مصاصة دماء."}},
  
  // The Witcher
  {w:"The Witcher",en:{n:"Geralt",p:"Balance over chaos.",m:"White wolf swordsman."},ar:{n:"جيرالت",p:"التوازن قبل الفوضى.",m:"الذئب الأبيض."}},
  {w:"The Witcher",en:{n:"Ciri",p:"Fate can be broken.",m:"Child of prophecy."},ar:{n:"سيري",p:"القدر يُكسر.",m:"طفلة النبوءة."}},
  {w:"The Witcher",en:{n:"Yennefer",p:"Power demands sacrifice.",m:"Sorceress of fire."},ar:{n:"ينيفر",p:"القوة بثمن.",m:"ساحرة قوية."}},
  {w:"The Witcher",en:{n:"Vesemir",p:"Wisdom of experience.",m:"Old mentor."},ar:{n:"فيسيمير",p:"حكمة الخبرة.",m:"المعلم العجوز."}},
  {w:"The Witcher",en:{n:"Eredin",p:"Rule through fear.",m:"King of the Wild Hunt."},ar:{n:"إيريدين",p:"الحكم بالخوف.",m:"ملك الصيد البري."}},
  {w:"The Witcher",en:{n:"Triss",p:"Hope over cruelty.",m:"Kind sorceress."},ar:{n:"تريس",p:"الأمل قبل القسوة.",m:"ساحرة طيبة"}},
  
  // God of War
  {w:"God of War",en:{n:"Kratos",p:"Master your rage.",m:"Scarred god-slayer."},ar:{n:"كريتوس",p:"سيطر على غضبك.",m:"قاتل الآلهة."}},
  {w:"God of War",en:{n:"Atreus",p:"Identity defines destiny.",m:"Boy seeking truth."},ar:{n:"أتريوس",p:"الهوية تصنع القدر.",m:"فتى يبحث عن ذاته."}},
  {w:"God of War",en:{n:"Odin",p:"Knowledge above all.",m:"All-seeing tyrant."},ar:{n:"أودين",p:"المعرفة أولاً.",m:"طاغية حكيم."}},
  {w:"God of War",en:{n:"Thor",p:"Strength without mercy.",m:"Thunder brute."},ar:{n:"ثور",p:"قوة بلا رحمة.",m:"محارب الرعد."}},
  {w:"God of War",en:{n:"Freya",p:"Love turns to wrath.",m:"Vengeful mother."},ar:{n:"فريا",p:"الحب ينقلب غضبًا.",m:"أم غاضبة."}},
  {w:"God of War",en:{n:"Baldur",p:"Pain defines existence.",m:"Cursed god."},ar:{n:"بالدر",p:"الألم هو الوجود.",m:"إله ملعون."}},
  
  // Elden Ring
  {w:"Elden Ring",en:{n:"Malenia",p:"Pride through suffering.",m:"Scarlet blade."},ar:{n:"مالينيا",p:"الكبرياء عبر الألم.",m:"نصل القرمز."}},
  {w:"Elden Ring",en:{n:"Radahn",p:"Honor in madness.",m:"Fallen general."},ar:{n:"رادهان",p:"الشرف في الجنون.",m:"جنرال ساقط."}},
  {w:"Elden Ring",en:{n:"Ranni",p:"Freedom from fate.",m:"Witch of the moon."},ar:{n:"راني",p:"الحرية من القدر.",m:"ساحرة القمر."}},
  {w:"Elden Ring",en:{n:"Godfrey",p:"Strength is legacy.",m:"First Elden Lord."},ar:{n:"جودفري",p:"القوة إرث.",m:"اللورد الأول."}},
  {w:"Elden Ring",en:{n:"Marika",p:"Order through sacrifice.",m:"Broken goddess."},ar:{n:"ماريكا",p:"النظام بالتضحية.",m:"إلهة محطمة."}},
  {w:"Elden Ring",en:{n:"The Tarnished",p:"Will over destiny.",m:"Exiled warrior."},ar:{n:"التارنشد",p:"الإرادة فوق القدر.",m:"محارب منفي."}}
];

const games=[
  {en:{n:"The Elder Scrolls: Skyrim",d:"Explore a vast open world full of dragons, magic, and ancient conflict.",y:2011,g:"RPG"},ar:{n:"ذا إلدر سكرولز: سكايرم",d:"استكشف عالمًا مفتوحًا مليئًا بالتنانين والسحر والصراعات القديمة.",y:2011,g:"تقمص أدوار"}},
  {en:{n:"The Witcher 3: Wild Hunt",d:"A dark fantasy world where choices define the fate of nations.",y:2015,g:"RPG"},ar:{n:"ذا ويتشر 3: الصيد البري",d:"عالم فانتازي مظلم حيث تحدد اختياراتك مصير الأمم.",y:2015,g:"تقمص أدوار"}},
  {en:{n:"God of War",d:"A mythological world of gods, monsters, and personal redemption.",y:2018,g:"Action/Adventure"},ar:{n:"جود أوف وور",d:"عالم أسطوري من الآلهة والوحوش والخلاص الشخصي.",y:2018,g:"أكشن/مغامرة"}},
  {en:{n:"Elden Ring",d:"A vast fantasy universe of kingdoms, demigods, and mystical powers.",y:2022,g:"RPG"},ar:{n:"إلدن رينغ",d:"كون فانتازي شاسع من الممالك وأنصاف الآلهة والقوى الغامضة.",y:2022,g:"تقمص أدوار"}}
];

// ==== DOM ====
const archive=document.getElementById("archive");
const search=document.getElementById("search");
const filter=document.getElementById("filter");
const langBtn=document.querySelector(".lang");

// ==== إعداد فلتر لكل صفحة ====
function setupFilter(){
 filter.innerHTML="";
 if(currentTab==="characters"){
  let gamesSet=new Set(characters.map(c=>c.w));
  filter.innerHTML='<option value="all">All Games</option>';
  gamesSet.forEach(g=>filter.innerHTML+=`<option>${g}</option>`);
 }else{
  let genres=new Set(games.map(g=>g[lang].g));
  filter.innerHTML='<option value="all">All Genres</option>';
  genres.forEach(g=>filter.innerHTML+=`<option>${g}</option>`);
 }
}

// ==== Render ====
function render(){
 archive.innerHTML="";
 const q=search.value.toLowerCase();
 const f=filter.value;
 if(currentTab==="characters"){
  characters.forEach(c=>{
   if((f==="all"||c.w===f)&&c[lang].n.toLowerCase().includes(q)){
    archive.innerHTML+=`
    <div class="card">
     <h2>${c[lang].n}</h2>
     <span class="tag">${c.w}</span>
     <div class="section">${lang==="en"?"Power Philosophy":"فلسفة القوة"}</div>
     <p>${c[lang].p}</p>
     <div class="section">${lang==="en"?"Mental Image":"الصورة الذهنية"}</div>
     <p>${c[lang].m}</p>
    </div>`;
   }
  });
 }else{
  games.forEach(g=>{
   if((f==="all"||g[lang].g===f)&&g[lang].n.toLowerCase().includes(q)){
    archive.innerHTML+=`
    <div class="card">
     <h2>${g[lang].n}</h2>
     <span class="tag">${g[lang].g}</span>
     <div class="section">${lang==="en"?"Description":"الوصف"}</div>
     <p>${g[lang].d}</p>
     <div class="section">${lang==="en"?"Release Year":"سنة الإصدار"}</div>
     <p>${g[lang].y}</p>
    </div>`;
   }
  });
 }
}

// ==== اللغة ====
langBtn.onclick = () => {
 lang = lang === "en" ? "ar" : "en";
 document.body.dir = lang === "ar" ? "rtl" : "ltr";
 langBtn.textContent = lang.toUpperCase(); // عرض EN أو AR
 setupFilter();
 render();
};
// عند تحميل الصفحة
langBtn.textContent = lang.toUpperCase();

// ==== البحث والفلترة ====
search.oninput = filter.onchange = render;

// ==== إعداد الصفحة الأولى ====
setupFilter();
render();
</script>

</body>
</html>
