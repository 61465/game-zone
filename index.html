<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Zone Archive</title>
<meta name="google-site-verification" content="c1g-qoUtlOl2NrEc49_cQwBFbKEoUxt17kzb4KjqACM" />
<style>
:root{
 --bg:#05070a;--card:#0f1216;--gold:#d4af37;
 --text:#e6e6e6;--muted:#9aa0a6;--border:#1e232b
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Tahoma}
body{background:var(--bg);color:var(--text);padding:30px}
header{text-align:center;margin-bottom:25px}
h1{color:var(--gold);font-size:2.6rem}
nav{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
nav button{padding:10px 15px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer}
nav button.active{border-color:var(--gold)}
.controls{display:flex;gap:10px;justify-content:center;margin:20px 0;flex-wrap:wrap}
input,select,button{
 background:var(--card);color:var(--text);
 border:1px solid var(--border);
 padding:10px 14px;border-radius:10px
}
/* زر اللغة بتصميم بلايستيشن */
button.lang {
 width: 50px;
 height: 50px;
 border-radius: 50%;
 background: linear-gradient(145deg,#0055ff,#1a7bff);
 color: #fff;
 font-weight: bold;
 font-size: 1rem;
 border: none;
 cursor: pointer;
 box-shadow: 0 5px #003cb3;
 transition: all 0.2s ease;
}
button.lang:active {
 transform: translateY(4px);
 box-shadow: 0 1px #003cb3;
}
button.lang:hover {
 background: linear-gradient(145deg,#0066ff,#3399ff);
}

.archive{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
 gap:25px;max-width:1400px;margin:auto
}
.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:16px;padding:22px;
 transition:.3s
}
.card:hover{transform:translateY(-5px);border-color:var(--gold)}
.card h2{color:var(--gold)}
.tag{
 display:inline-block;margin:10px 0;
 font-size:.75rem;padding:4px 10px;
 border-radius:20px;
 background:rgba(212,175,55,.15);color:var(--gold)
}
.section{font-size:.8rem;color:var(--muted);margin-top:12px;text-transform:uppercase}
footer{text-align:center;margin-top:40px;color:var(--muted)}
</style>
</head>

<body>

<header>
<h1 id="title">Game Zone Archive</h1>
<p id="subtitle">Video Game Encyclopedia</p>
</header>

<nav>
<button class="tab active" data-tab="characters">Characters</button>
<button class="tab" data-tab="games">Games</button>
<button class="lang"></button>
</nav>

<div class="controls" id="controls">
<input id="search" placeholder="Search...">
<select id="filter">
<option value="all">All</option>
</select>
</div>

<section class="archive" id="archive"></section>

<footer>© 2026 — Game Zone Archive</footer>

  {en:{n:"The Witcher 3",d:"A dark fantasy world where choices define the fate of nations.",y:2015,g:"RPG"},ar:{n:"ذا ويتشر 3",d:"عالم فانتازي مظلم حيث تحدد اختياراتك مصير الأمم.",y:2015,g:"تقمص أدوار"}},

// ==== إعداد فلتر لكل صفحة ====
function setupFilter(){
 filter.innerHTML="";
 if(currentTab==="characters"){
  let gamesSet=new Set(characters.map(c=>c.w));
  filter.innerHTML=`<option value="all">${lang==="en"?"All Games":"كل الألعاب"}</option>`;
  gamesSet.forEach(g=>filter.innerHTML+=`<option value="${g}">${g}</option>`);
 }else{
  let genres=new Set(games.map(g=>g[lang].g));
  filter.innerHTML=`<option value="all">${lang==="en"?"All Genres":"كل الأنواع"}</option>`;
  genres.forEach(g=>filter.innerHTML+=`<option value="${g}">${g}</option>`);
 }
}

// ==== Render ====
function render(){
 archive.innerHTML="";
 const q=search.value.toLowerCase();
 const f=filter.value;
 if(currentTab==="characters"){
  characters.forEach(c=>{
   if((f==="all"||c.w===f)&&c[lang].n.toLowerCase().includes(q)){
    archive.innerHTML+=`
    <div class="card">
     <h2>${c[lang].n}</h2>
     <span class="tag">${c.w}</span>
     <div class="section">${lang==="en"?"Phrase":"جملة"}</div>
     <p>${c[lang].p}</p>
     <div class="section">${lang==="en"?"Image Concept":"الصورة الذهنية"}</div>
     <p>${c[lang].m}</p>
    </div>`;
   }
  });
 }else{
  games.forEach(g=>{
   if((f==="all"||g[lang].g===f)&&g[lang].n.toLowerCase().includes(q)){
    archive.innerHTML+=`
    <div class="card">
     <h2>${g[lang].n}</h2>
     <span class="tag">${g[lang].g}</span>
     <div class="section">${lang==="en"?"Description":"الوصف"}</div>
     <p>${g[lang].d}</p>
     <div class="section">${lang==="en"?"Release Year":"سنة الإصدار"}</div>
     <p>${g[lang].y}</p>
    </div>`;
   }
  });
 }
}

// ==== الأحداث ====
tabs.forEach(t=>{
 t.addEventListener("click",()=>{
  tabs.forEach(b=>b.classList.remove("active"));
  t.classList.add("active");
  currentTab=t.dataset.tab;
  setupFilter();
  render();
 });
});

search.addEventListener("input",render);
filter.addEventListener("change",render);

// زر اللغة
langBtn.textContent="EN";
langBtn.addEventListener("click",()=>{
 lang=lang==="en"?"ar":"en";
 langBtn.textContent=lang==="en"?"EN":"AR";
 setupFilter();
 render();
});

// أول تحميل
setupFilter();
render();

</script>
</body>
</html>
